name: Publish NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to publish, for example v1.1.5'
        required: true
        default: 'v1.1.5'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Restore
        run: dotnet restore rpc-dotnet-toolkit.sln

      - name: Build
        run: dotnet build rpc-dotnet-toolkit.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test rpc-dotnet-toolkit.sln --configuration Release --no-build

      - name: Pack
        run: |
          mkdir -p artifacts/nuget
          dotnet pack src/RpcToolkit/RpcToolkit.csproj --configuration Release --no-build --output artifacts/nuget
          dotnet pack src/RpcToolkit.AspNetCore/RpcToolkit.AspNetCore.csproj --configuration Release --no-build --output artifacts/nuget

      - name: Login to NuGet
        uses: NuGet/login@v1
        id: login
        with:
          user: n-car

      - name: Publish packages
        run: dotnet nuget push "artifacts/nuget/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate

      - name: List packages on NuGet
        run: |
          python - <<'PY' > package-list.tsv
          from pathlib import Path
          import xml.etree.ElementTree as ET
          import zipfile

          for package_path in sorted(Path("artifacts/nuget").glob("*.nupkg")):
              with zipfile.ZipFile(package_path) as package:
                  nuspec_path = next(name for name in package.namelist() if name.endswith(".nuspec"))
                  root = ET.fromstring(package.read(nuspec_path))
                  namespace = {}
                  if root.tag.startswith("{"):
                      namespace["n"] = root.tag.split("}", 1)[0][1:]
                      metadata = root.find("n:metadata", namespace)
                      package_id = metadata.find("n:id", namespace).text
                      version = metadata.find("n:version", namespace).text
                  else:
                      metadata = root.find("metadata")
                      package_id = metadata.find("id").text
                      version = metadata.find("version").text
                  print(f"{package_id}\t{version}")
          PY

          while IFS=$'\t' read -r package_id version; do
            echo "Listing ${package_id} ${version}"
            curl --fail-with-body --request POST \
              --header "X-NuGet-ApiKey: ${{ steps.login.outputs.NUGET_API_KEY }}" \
              --data-binary "" \
              "https://www.nuget.org/api/v2/package/${package_id}/${version}"
          done < package-list.tsv
